<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KI Fotobox – TV</title>
<style>
  :root{
    --bg1:#12071f; --bg2:#1b0b2e; --accent:#ff5c8a; --accent2:#7c5cff; --gold:#ffd36e;
    --text:#ffffff; --muted:#c9b8e0; --paper:#fdfdf7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#000;color:var(--text);
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif}
  #stage{position:fixed;inset:0;overflow:hidden;perspective:1600px;
    background:
    radial-gradient(1200px 800px at 20% 10%, rgba(124,92,255,.35), transparent 60%),
    radial-gradient(1000px 700px at 85% 90%, rgba(255,92,138,.3), transparent 60%),
    linear-gradient(135deg,var(--bg1),var(--bg2))}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.4;animation:float 18s ease-in-out infinite}
  .blob.a{width:560px;height:560px;background:var(--accent2);top:-140px;left:-90px}
  .blob.b{width:480px;height:480px;background:var(--accent);bottom:-140px;right:-70px;animation-delay:-7s}
  .blob.c{width:400px;height:400px;background:var(--gold);top:35%;left:55%;opacity:.2;animation-delay:-12s}
  @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(55px,-45px) scale(1.14)}}

  .topbar{position:absolute;top:0;left:0;right:0;height:11vh;display:flex;align-items:center;
    justify-content:space-between;padding:0 4vw;z-index:60}
  .brand{font-size:2.4vw;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent2));
    background-size:200% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shine 5s linear infinite}
  @keyframes shine{to{background-position:200% center}}
  .qr{font-size:1.15vw;color:var(--muted);text-align:right;line-height:1.5}
  .qr b{color:var(--gold)}

  .view{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none}
  .view.show{opacity:1}

  /* ---- POLAROID ---- */
  .polaroid{position:absolute;background:var(--paper);padding:0.8vw 0.8vw 3.2vw 0.8vw;border-radius:6px;
    box-shadow:0 18px 40px rgba(0,0,0,.5); will-change:transform,opacity;
    transform-style:preserve-3d; transition:none}
  .polaroid .pic{width:15vw;height:15vw;overflow:hidden;border-radius:2px;background:#000;position:relative}
  .polaroid .pic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:0;transition:opacity .9s ease}
  .polaroid .pic img.on{opacity:1}
  .polaroid .cap{position:absolute;left:0;right:0;bottom:.7vw;text-align:center;
    font-family:"Segoe Script","Bradley Hand",cursive;color:#3a2f2f;font-size:1vw}
  .polaroid .tag{position:absolute;top:.9vw;left:.9vw;padding:.25vw .7vw;border-radius:999px;
    font-size:.75vw;font-weight:800;letter-spacing:.5px;color:#fff;opacity:0;transition:opacity .4s}
  .polaroid .tag.before{background:rgba(0,0,0,.55)}
  .polaroid .tag.after{background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .polaroid.scatter{opacity:.7}
  .polaroid.focus{z-index:40;opacity:1!important}
  /* Featured-Polaroid: komplett deckend, keine hinteren Fotos sichtbar */
  .polaroid.focus .pic{background:#000}
  .polaroid.focus{background:#fff}

  .headline{position:absolute;bottom:5vh;left:0;right:0;text-align:center;z-index:55;
    font-size:1.9vw;font-weight:700;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.6)}
  .headline .hl{background:linear-gradient(90deg,var(--accent),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}

  /* ---- REVEAL (nach Foto): grosses Polaroid, das sich dreht ---- */
  #reveal{display:flex;align-items:center;justify-content:center;flex-direction:column}
  #reveal .title{position:absolute;top:13vh;font-size:2.4vw;font-weight:800;z-index:5;
    background:linear-gradient(90deg,var(--accent),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .bigpola{background:var(--paper);padding:1.4vw 1.4vw 5vw 1.4vw;border-radius:10px;
    box-shadow:0 40px 90px rgba(0,0,0,.6);transform-style:preserve-3d;position:relative}
  .bigpola .pic{width:44vh;height:44vh;overflow:hidden;border-radius:3px;background:#000;position:relative}
  .bigpola .pic img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:0;transition:opacity .8s ease}
  .bigpola .pic img.on{opacity:1}
  .bigpola .cap{position:absolute;left:0;right:0;bottom:1.4vw;text-align:center;
    font-family:"Segoe Script","Bradley Hand",cursive;color:#3a2f2f;font-size:2vw}
  .flip3d{animation:flip3d 1.1s cubic-bezier(.4,.1,.2,1) both}
  @keyframes flip3d{
    0%{transform:rotateY(0deg) scale(1)}
    50%{transform:rotateY(90deg) scale(1.05)}
    100%{transform:rotateY(0deg) scale(1)}
  }

  /* ---- SINGLE ---- */
  #single{display:flex;align-items:center;justify-content:center}
  #single .bigpola .pic{width:66vh;height:66vh}

  #status{position:fixed;bottom:10px;right:14px;font-size:12px;color:rgba(255,255,255,.2);z-index:99}
</style>
</head>
<body>
<div id="stage">
  <div class="blob a"></div><div class="blob b"></div><div class="blob c"></div>

  <div class="topbar">
    <div class="brand">📸 KI FOTOBOX</div>
    <div class="qr">Mach dein Foto am <b>Handy</b><br>und werde zum Kunstwerk! ✨</div>
  </div>

  <!-- IDLE: verstreute Polaroids -->
  <div class="view show" id="idle">
    <div id="scatter"></div>
    <div class="headline">Aus deinem Foto wird ein <span class="hl">Kunstwerk</span> ✨</div>
  </div>

  <!-- REVEAL -->
  <div class="view" id="reveal">
    <div class="title">✨ Dein Ergebnis ✨</div>
    <div class="bigpola" id="revPola">
      <div class="pic"><span class="tagx"></span><img id="revBefore" alt=""><img id="revAfter" alt=""></div>
      <div class="cap" id="revCap">frisch gezaubert</div>
    </div>
  </div>

  <!-- SINGLE -->
  <div class="view" id="single">
    <div class="bigpola"><div class="pic"><img id="singleImg" class="on" alt=""></div><div class="cap">📸 KI Fotobox</div></div>
  </div>

  <div id="status">verbinde…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyBcrUZdnK1sxz9tlcDdAFOCUlLuo3-3jvA",
  authDomain: "aiphotobooth-45c02.firebaseapp.com",
  databaseURL: "https://aiphotobooth-45c02-default-rtdb.firebaseio.com",
  projectId: "aiphotobooth-45c02",
  storageBucket: "aiphotobooth-45c02.firebasestorage.app",
  messagingSenderId: "793480156182",
  appId: "1:793480156182:web:755cbfc0dede74ad2c9137"
};
const $ = id => document.getElementById(id);
const views = { idle:$("idle"), reveal:$("reveal"), single:$("single") };
function showView(name){ Object.entries(views).forEach(([k,el])=>el.classList.toggle("show", k===name)); }

const captions = {
  "hero-familie":"Familie","b3-familie-mama":"Mit Mama","b2-geburtstag":"Geburtstag",
  "b4-hochzeit":"Hochzeit","b5-oma-opa":"Oma & Opa","b7-hund":"Bester Freund",
  "oba5-haustier":"Haustier","b3-einschulung":"Einschulung","b8-demenz":"Erinnerung"
};

let pairs=[];
const scatterEl = $("scatter");
let polas=[];          // {el, before, after, showingAfter, baseX,baseY,baseRot,baseScale}
let focusIdx=-1, cycleTimer=null;

// Verstreute Positionen (Prozent), leicht gedreht – wie auf einem Tisch
const SLOTS = [
  {x:12,y:20,r:-8}, {x:34,y:14,r:5}, {x:58,y:17,r:-4}, {x:80,y:22,r:9},
  {x:18,y:52,r:6},  {x:42,y:50,r:-6},{x:66,y:53,r:4},  {x:85,y:55,r:-9},
  {x:28,y:76,r:-5}
];

function buildScatter(){
  scatterEl.innerHTML=""; polas=[];
  pairs.forEach((p,i)=>{
    const slot = SLOTS[i % SLOTS.length];
    const el=document.createElement("div");
    el.className="polaroid scatter";
    el.innerHTML =
      `<div class="pic"><span class="tag before">VORHER</span>
         <img class="imgB on" src="${p.before}">
         <img class="imgA" src="${p.after}"></div>
       <div class="cap">${captions[p.name]||""}</div>`;
    el.style.left = slot.x+"vw";
    el.style.top  = slot.y+"vh";
    const rot = slot.r + (Math.random()*4-2);
    el.dataset.rot = rot;
    el.style.transform = `rotate(${rot}deg)`;
    el.style.transition = "transform 1.1s cubic-bezier(.2,.9,.3,1), opacity .8s ease, box-shadow .8s";
    scatterEl.appendChild(el);
    polas.push({el, showingAfter:false, tagEl:el.querySelector(".tag"),
      imgB:el.querySelector(".imgB"), imgA:el.querySelector(".imgA"), rot});
  });
}

function focusNext(){
  if(!polas.length) return;
  // vorheriges zuruecklegen
  if(focusIdx>=0){
    const prev=polas[focusIdx];
    prev.el.classList.remove("focus");
    prev.el.style.transform = `rotate(${prev.rot}deg) scale(1)`;
    prev.el.style.boxShadow = "0 18px 40px rgba(0,0,0,.5)";
    prev.imgA.classList.remove("on"); prev.imgB.classList.add("on");
    prev.tagEl.className="tag before"; prev.tagEl.textContent="VORHER"; prev.tagEl.style.opacity=0;
    prev.showingAfter=false;
  }
  focusIdx=(focusIdx+1)%polas.length;
  const f=polas[focusIdx];
  f.el.classList.add("focus");
  f.tagEl.style.opacity=1;
  // in die Mitte schweben + gross + leicht gerade drehen
  const rect=f.el.getBoundingClientRect();
  const cx=window.innerWidth/2, cy=window.innerHeight*0.46;
  const dx=cx-(rect.left+rect.width/2), dy=cy-(rect.top+rect.height/2);
  f.el.style.transform = `translate(${dx}px,${dy}px) rotate(0deg) scale(2.35)`;
  f.el.style.boxShadow = "0 40px 90px rgba(0,0,0,.65)";
  // nach kurzem Moment: Vorher -> Nachher "entwickeln"
  setTimeout(()=>{
    f.imgB.classList.remove("on"); f.imgA.classList.add("on");
    f.tagEl.className="tag after"; f.tagEl.textContent="NACHHER";
    f.showingAfter=true;
  }, 1400);
}

function startCycle(){
  clearInterval(cycleTimer);
  if(!polas.length) return;
  focusIdx=-1;
  focusNext();
  cycleTimer=setInterval(focusNext, 4200);
}

let db=null, idleTimer=null;
function connect(){
  try{
    db=getDatabase(initializeApp(firebaseConfig));
    onValue(ref(db,"gallery/pairs"), snap=>{
      const v=snap.val();
      if(v && Array.isArray(v) && v.length){ pairs=v.filter(x=>x&&x.before&&x.after); buildScatter(); startCycle(); }
    });
    onValue(ref(db,"display"), snap=>{ $("status").textContent="verbunden"; handleDisplay(snap.val()); },
      ()=>{ $("status").textContent="Reconnect…"; });
  }catch(e){ $("status").textContent="Reconnect…"; setTimeout(connect,2500); }
}

function handleDisplay(d){
  clearTimeout(idleTimer);
  if(!d){ showView("idle"); startCycle(); return; }
  const hold=(typeof d.hold==="number")?d.hold:12000;
  if(d.mode==="reveal" && d.before && d.after){
    clearInterval(cycleTimer);
    $("revBefore").src=d.before; $("revBefore").classList.add("on");
    $("revAfter").src=d.after; $("revAfter").classList.remove("on");
    showView("reveal");
    // Polaroid dreht sich, dabei Wechsel Vorher->Nachher
    setTimeout(()=>{
      $("revPola").classList.remove("flip3d"); void $("revPola").offsetWidth; $("revPola").classList.add("flip3d");
      setTimeout(()=>{ $("revBefore").classList.remove("on"); $("revAfter").classList.add("on"); }, 550);
    }, 700);
    if(hold>0) idleTimer=setTimeout(()=>{ showView("idle"); startCycle(); }, hold);
  } else if(d.mode==="single" && d.after){
    clearInterval(cycleTimer);
    $("singleImg").src=d.after; showView("single");
    if(hold>0) idleTimer=setTimeout(()=>{ showView("idle"); startCycle(); }, hold);
  } else { showView("idle"); startCycle(); }
}

connect();
setInterval(()=>{ if($("status").textContent==="Reconnect…") location.reload(); }, 60000);
</script>
</body>
</html>
